<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Web OS</title>

  <link rel="stylesheet" href="style.css"/>

  <!-- NEW FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
  
<div class="bg"></div>
  
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>WebOS</h2>

    <button data-page="home" onclick="showPage('home')">Home</button>
<button data-page="music" onclick="showPage('music')">Music</button>
<button data-page="games" onclick="showPage('games')">Games</button>
<button data-page="search" onclick="showPage('search')">Search</button>
<button data-page="settings" onclick="showPage('settings')">Settings</button>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <!-- HOME -->
  <div class="page" id="home">
  <h1>Home</h1>

  <div class="dashboard">

    <div class="tile" onclick="showPage('games')">🎮 Games</div>
    <div class="tile" onclick="showPage('music')">🎵 Music</div>
    <div class="tile" onclick="showPage('search')">🌐 Search</div>
    <div class="tile" onclick="showPage('settings')">⚙️ Settings</div>

  </div>
</div>
    <!-- MUSIC -->
    <div class="page hidden" id="music">
      <h1>Music</h1>
      <iframe width="100%" height="300"
        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        frameborder="0"></iframe>
    </div>

    <!-- GAMES -->
    <div class="page hidden" id="games">
      <h1>Games Library</h1>
      <p>Coming next (JSON system)</p>
    </div>

    <!-- SEARCH -->
    <div class="page hidden" id="search">
  <h1>Search</h1>

  <div class="search-app">
    <div class="search-bar">
      <input id="searchInput" type="text" placeholder="Search the web..." />
      <button onclick="runSearch()">Search</button>
    </div>

    <div id="searchFrameContainer">
      <p style="opacity:0.6; padding:15px;">
        Type something to search
      </p>
    </div>
  </div>
</div>

    <!-- SAFE VERSION: start empty -->
    <div id="searchFrameContainer" class="search-frame">
      <p style="opacity:0.6">Search results will appear here</p>
    </div>
  </div>
</div>

    <!-- SETTINGS -->
   <div class="page hidden" id="settings">
  <h1>Settings</h1>

  <div class="settings-box">
    <h3>Theme Background</h3>

    <button onclick="setTheme('default')">Default</button>
    <button onclick="setTheme('blue')">Blue</button>
    <button onclick="setTheme('green')">Green</button>
    <button onclick="setTheme('red')">Red</button>
  </div>

</div>

</div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
