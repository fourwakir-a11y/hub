<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Web OS</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>WebOS</h2>

    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('music')">Music</button>
    <button onclick="showPage('games')">Games</button>
    <button onclick="showPage('search')">Search</button>
    <button onclick="showPage('settings')">Settings</button>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <!-- HOME -->
    <div class="page" id="home">
  <h1>Home</h1>

  <div class="dashboard">

    <div class="tile">🎮 Games Library</div>
    <div class="tile">🎵 Music</div>
    <div class="tile">🌐 Search</div>
    <div class="tile">⚙️ Settings</div>

  </div>
</div>

    <!-- MUSIC -->
    <div class="page hidden" id="music">
      <h1>Music</h1>
      <iframe width="100%" height="300"
        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        frameborder="0"></iframe>
    </div>

    <!-- GAMES -->
    <div class="page hidden" id="games">
      <h1>Games Library</h1>
      <p>Coming next (JSON system)</p>
    </div>

    <!-- SEARCH -->
    <div class="page hidden" id="search">
      <h1>Search</h1>
      <iframe src="https://duckduckgo.com/"
        width="100%" height="500"></iframe>
    </div>

    <!-- SETTINGS -->
    <div class="page hidden" id="settings">
      <h1>Settings</h1>
      <button onclick="setBg()">Change Background</button>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
