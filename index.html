<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Xbox Game Library</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="hero" id="hero">
    <h1 id="title">Xbox Library</h1>
    <p id="description">Hover a game to preview it</p>
  </div>

  <div class="games">

  <div class="card"
       onmouseover="changeGame('Fortnite','Battle Royale chaos','https://images.unsplash.com/photo-1605902711622-cfb43c4437d0?w=1200')">
    <img src="https://images.unsplash.com/photo-1605902711622-cfb43c4437d0?w=400" />
  </div>

  <div class="card"
       onmouseover="changeGame('Minecraft','Build anything you want','https://images.unsplash.com/photo-1607457561901-e6ec3a6d7c5c?w=1200')">
    <img src="https://images.unsplash.com/photo-1607457561901-e6ec3a6d7c5c?w=400" />
  </div>

  <div class="card"
       onmouseover="changeGame('GTA V','Open world chaos','https://images.unsplash.com/photo-1493711662062-fa541adb3fc8?w=1200')">
    <img src="https://images.unsplash.com/photo-1493711662062-fa541adb3fc8?w=400" />
  </div>

</div>
